services:
  - type: web
    name: banking-api
    runtime: python
    region: frankfurt   # Changer selon ta préférence: oregon, frankfurt, singapore
    plan: free           # Passer à 'starter' en production

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn banking_api.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: DATABASE_URL
        sync: false   # À définir manuellement dans le dashboard Render (copie la URL Neon)
      - key: SECRET_KEY
        generateValue: true   # Render génère automatiquement une valeur sécurisée
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: PYTHON_VERSION
        value: "3.11.0"
